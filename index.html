<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitinho da Navalha - Gestão</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #050505;
            --card: #121212;
            --neon-green: #39FF14;
            --neon-blue: #00E5FF;
            --text: #f0f0f0;
            --danger: #ff4d4d;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .n-blue {
            color: var(--neon-blue);
            text-shadow: 0 0 8px var(--neon-blue);
            margin: 0;
            font-size: 1.1rem;
        }

        .n-green {
            color: var(--neon-green);
            text-shadow: 0 0 10px var(--neon-green);
            margin: 0;
            font-size: 1.7rem;
            text-transform: uppercase;
        }

        nav {
            display: flex;
            background: var(--card);
            border-bottom: 1px solid #222;
        }

        .nav-btn {
            flex: 1;
            padding: 15px;
            border: none;
            background: none;
            color: #777;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.8rem;
        }

        .nav-btn.active {
            color: var(--neon-green);
            border-bottom: 2px solid var(--neon-green);
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            padding-bottom: 80px;
        }

        .section {
            display: none;
        }

        .section.active {
            display: block;
            animation: fadeIn 0.4s;
        }

        .kpi-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #222;
            margin-bottom: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            font-size: 1rem;
        }

        .btn-neon {
            width: 100%;
            padding: 14px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            border: 1px solid var(--neon-green);
            background: rgba(57, 255, 20, 0.05);
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .client-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--neon-blue);
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .pago {
            background: rgba(57, 255, 20, 0.15);
            color: var(--neon-green);
        }

        .pendente {
            background: rgba(255, 77, 77, 0.15);
            color: var(--danger);
        }

        .action-btns {
            margin-top: 12px;
            display: flex;
            gap: 8px;
        }

        .action-btns button {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #444;
            background: #1a1a1a;
            color: #ccc;
            font-size: 0.7rem;
            cursor: pointer;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <header>
        <p class="n-blue">VITINHO</p>
        <h1 class="n-green">DA NAVALHA</h1>
    </header>

    <nav id="appNav">
        <button class="nav-btn active" onclick="showTab('resumo')">RESUMO</button>
        <button class="nav-btn" onclick="showTab('clientes')">CLIENTES</button>
        <button class="nav-btn" onclick="showTab('config')">AJUSTES</button>
    </nav>

    <main>
        <section id="resumo" class="section active">
            <div class="kpi-row">
                <div class="card" style="text-align: center;">
                    <small style="color: #888;">LUCRO TOTAL</small>
                    <div id="lucroTotal" class="n-blue" style="font-size: 1.4rem; font-weight: bold;">R$ 0,00</div>
                </div>
                <div class="card" style="text-align: center;">
                    <small style="color: #888;">CORTES EM ESTOQUE</small>
                    <div id="cortesEstoque" class="n-green" style="font-size: 1.4rem; font-weight: bold;">0</div>
                </div>
            </div>
            <h3 style="font-size: 1rem; margin-bottom: 10px; color: var(--neon-blue);">Dívidas Pendentes</h3>
            <div id="listaPendentes"></div>
        </section>

        <section id="clientes" class="section">
            <div class="card">
                <h3 style="margin-top:0; font-size: 1rem;">Cadastrar Novo Membro</h3>
                <input type="text" id="nomeCliente" placeholder="Nome do Atleta">
                <select id="planoCliente">
                    <option value="100|5">5 Sociais - R$ 100</option>
                    <option value="130|4">4 Navalhados - R$ 130</option>
                    <option value="180|4">4 Sociais + Barba - R$ 180</option>
                    <option value="200|4">Combo Premium - R$ 200</option>
                </select>
                <button class="btn-neon" onclick="cadastrar()">Salvar no Sistema</button>
            </div>
            <div id="listaGeral"></div>
        </section>

        <section id="config" class="section">
            <div class="card">
                <h3>Reiniciar Ciclo</h3>
                <p style="font-size: 0.9rem; color: #888;">Limpar todos os dados para começar um novo mês de
                    faturamento.</p>
                <button class="btn-neon" style="border-color: var(--danger); color: var(--danger);"
                    onclick="resetApp()">ZERAR TUDO</button>
            </div>
            <p style="text-align: center; font-size: 0.7rem; color: #444;">Desenvolvido por Vini Lopes</p>
        </section>
    </main>

    <script type="module">
        // Estrutura preparada para Firebase futuramente
        let db = JSON.parse(localStorage.getItem('vitinho_barber_v1')) || [];

        window.showTab = (id) => {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        window.cadastrar = () => {
            const nome = document.getElementById('nomeCliente').value;
            const planoData = document.getElementById('planoCliente').value.split('|');
            if (!nome) return alert("Insira o nome!");

            db.push({
                id: Date.now(),
                nome: nome,
                valor: parseFloat(planoData[0]),
                saldo: parseInt(planoData[1]),
                pago: false
            });
            saveAndRender();
            document.getElementById('nomeCliente').value = '';
        }

        window.updateCorte = (id) => {
            const c = db.find(x => x.id === id);
            if (c.saldo > 0) { c.saldo--; saveAndRender(); }
            else alert("Créditos esgotados!");
        }

        window.togglePago = (id) => {
            const c = db.find(x => x.id === id);
            c.pago = !c.pago;
            saveAndRender();
        }

        window.resetApp = () => {
            if (confirm("Deseja apagar todos os registros de clientes?")) {
                db = [];
                saveAndRender();
            }
        }

        function saveAndRender() {
            localStorage.setItem('vitinho_barber_v1', JSON.stringify(db));
            renderApp();
        }

        function renderApp() {
            const totalCash = db.reduce((acc, c) => acc + c.valor, 0);
            const totalStock = db.reduce((acc, c) => acc + c.saldo, 0);
            document.getElementById('lucroTotal').innerText = `R$ ${totalCash.toFixed(2)}`;
            document.getElementById('cortesEstoque').innerText = totalStock;

            document.getElementById('listaGeral').innerHTML = db.map(c => `
                <div class="card client-item">
                    <div>
                        <strong>${c.nome}</strong><br>
                        <span class="badge ${c.pago ? 'pago' : 'pendente'}">${c.pago ? 'Pago' : 'Pendente'}</span>
                        <div class="action-btns">
                            <button onclick="updateCorte(${c.id})"><i class="fas fa-cut"></i> Usar</button>
                            <button onclick="togglePago(${c.id})"><i class="fas fa-check"></i> Status</button>
                        </div>
                    </div>
                    <div style="text-align: right">
                        <small style="color:#888">SALDO</small><br>
                        <span class="n-green" style="font-size:1.4rem">${c.saldo}</span>
                    </div>
                </div>
            `).join('');

            document.getElementById('listaPendentes').innerHTML = db.filter(c => !c.pago).map(c => `
                <div class="card" style="border-left: 3px solid var(--danger); padding: 10px;">
                    <span style="font-size:0.9rem">${c.nome}</span> 
                    <span style="float:right; font-weight:bold; color:var(--danger)">R$ ${c.valor}</span>
                </div>
            `).join('');
        }

        renderApp();
    </script>
</body>

</html>
